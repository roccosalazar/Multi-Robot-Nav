serial_number: w200-0005
version: 0
system:
  hosts:
    - hostname: cpr-w200-0005
      ip: 192.168.131.1
  ros2:
    namespace: r0
platform:
  color: dark_olive
  extras:
    urdf:
      path: /home/ubuntu/Multi-Robot-Nav/robots/payloads/canisters.xacro
    ros_parameters:
      platform_velocity_controller:
        enable_odom_tf: false
      ekf_node:
        publish_tf: false

sensors:
  camera:
    - model: intel_realsense
      urdf_enabled: true
      launch_enabled: true
      parent: turret_camera_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        intel_realsense:
          camera_name: camera_0
          device_type: d435
          serial_no: "0"
          enable_color: true
          rgb_camera.color_profile: 640,480,30
          enable_depth: true
          depth_module.depth_profile: 640,480,15
          pointcloud.enable: true
  lidar3d:
    - model: velodyne_lidar
      urdf_enabled: true
      launch_enabled: true
      parent: turret_lidar_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        velodyne_driver_node:
          frame_id: velodyne
          device_ip: 192.168.131.25
          port: 2368
          model: VLP16
        velodyne_transform_node:
          model: VLP16
          fixed_frame: velodyne
          target_frame: velodyne
