serial_number: w200-0001
version: 0
system:
  hosts:
    - hostname: cpr-w200-0001
      ip: 192.168.131.1
  ros2:
    namespace: aramis
platform:
  wheel: track
  extras:
    ros_parameters:
      platform_velocity_controller:
        enable_odom_tf: false
      ekf_node:
        publish_tf: false
links:
  box:
    - name: structure
      size: [0.5, 0.675, .5]
    - name: tower
      size: [0.15, 0.15, 0.5]
      parent: structure_link
      xyz: [0.0, 0.0, 0.5]
  frame:
    - name: top_tower
      parent: tower_link
      xyz: [0.0, 0.0, 0.25]
mounts:
  disk:
    - parent: post_0_mount
  post:
    - model: dual
      parent: top_tower_link
      xyz: [0.0, 0.0, 0.5]
      spacing: 0.12
sensors:
  lidar3d:
  - model: velodyne_lidar
    urdf_enabled: true
    launch_enabled: true
    parent: disk_0_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      velodyne_driver_node:
        frame_id: velodyne
        device_ip: 192.168.131.25
        port: 2368
        model: VLP16
      velodyne_transform_node:
        model: VLP16
        fixed_frame: velodyne
        target_frame: velodyne