serial_number: w200-0001
version: 0
system:
  hosts:
    - hostname: cpr-w200-0001
      ip: 192.168.131.1
  ros2:
    namespace: aramis
    domain_id: 0
    middleware:
      implementation: rmw_fastrtps_cpp
      discovery: simple
    workspaces: []
platform:
  wheel: track
  mcu:
    protocol: proton
  attachments:
    - name: bulkhead
      type: w200.bulkhead
      model: arm_plate
      parent: default_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      enabled: true
  extras:
    urdf:
      path: /home/ubuntu/Multi-Robot-Nav/debug/reports/utils/laser_turret.urdf.xacro
sensors:
  lidar3d:
    - model: velodyne_lidar
      urdf_enabled: true
      launch_enabled: true
      parent: turret_lidar_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        velodyne_driver_node:
          frame_id: lidar3d_0_laser
          device_ip: 192.168.131.25
          port: 2368
          model: VLP16
        velodyne_transform_node:
          model: VLP16
          fixed_frame: lidar3d_0_laser
          target_frame: lidar3d_0_laser
  camera:
    - model: flir_blackfly
      urdf_enabled: true
      launch_enabled: true
      parent: turret_camera_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        flir_blackfly:
          serial_number: ''
          gain_auto: Continuous
          pixel_format: BayerRG8
          # Resolution
          # image_width: 1408
          # image_height: 1080
          # offset_x: 0
          # offset_y: 0
          binning_x: 2
          binning_y: 2
          frame_rate_enable: true
          frame_rate_auto: Off
          frame_rate: 30